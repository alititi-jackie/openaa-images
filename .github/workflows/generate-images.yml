name: Generate images.json

on:
  push:
    branches: ["main"]
    paths:
      - "img/**"
      - "scripts/generate-images.js"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use GITHUB_TOKEN so the resulting push does not re-trigger this workflow
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate images.json
        run: node scripts/generate-images.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet -- images.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push images.json
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images.json
          git commit -m "Update images.json"
          git push
